<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Background canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">☁</span>
      <span class="logo-text">Weather</span>
    </div>
    <div class="header-controls">
      <button class="unit-toggle" id="unitToggle" title="Toggle units">
        <span id="unitLabel">°C</span>
      </button>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path id="themeIcon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Search -->
    <section class="search-section">
      <div class="search-wrapper">
        <div class="search-bar" id="searchBar">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            id="cityInput"
            class="search-input"
            placeholder="Search city or place…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="location-btn" id="locationBtn" title="Use my location">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/>
              <circle cx="12" cy="12" r="9" stroke-dasharray="2 4"/>
            </svg>
          </button>
          <button class="search-btn" id="searchBtn">Search</button>
        </div>

        <!-- Recent searches -->
        <div class="recent-searches" id="recentSearches" style="display:none">
          <span class="recent-label">Recent</span>
          <div class="recent-chips" id="recentChips"></div>
          <button class="clear-recent" id="clearRecent">Clear</button>
        </div>
      </div>
    </section>

    <!-- Error -->
    <div class="error-banner" id="errorBanner" style="display:none">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Something went wrong.</span>
    </div>

    <!-- Loading -->
    <div class="loading-state" id="loadingState" style="display:none">
      <div class="loader-ring">
        <div></div><div></div><div></div><div></div>
      </div>
      <p class="loading-text">Fetching weather data…</p>
    </div>

    <!-- Weather content (hidden until data loads) -->
    <div class="weather-content" id="weatherContent" style="display:none">

      <!-- Current Weather Card -->
      <section class="current-card" id="currentCard">
        <div class="current-top">
          <div class="current-location">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
            </svg>
            <span id="cityName">—</span>
            <span id="countryCode" class="country-code">—</span>
          </div>
          <div class="current-time" id="currentTime">—</div>
        </div>

        <div class="current-main">
          <div class="temp-block">
            <span class="temp-value" id="tempValue">—</span>
            <span class="temp-unit" id="tempUnit">°C</span>
          </div>
          <div class="weather-visual">
            <img id="weatherIcon" class="weather-icon" src="" alt="" />
            <p class="weather-desc" id="weatherDesc">—</p>
          </div>
        </div>

        <div class="feels-like">
          Feels like <strong id="feelsLike">—</strong> · High <strong id="tempMax">—</strong> · Low <strong id="tempMin">—</strong>
        </div>

        <!-- Stats grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2a7 7 0 0 1 7 7c0 4.5-7 13-7 13S5 13.5 5 9a7 7 0 0 1 7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
            <div class="stat-info">
              <span class="stat-label">Humidity</span>
              <span class="stat-value" id="humidity">—%</span>
            </div>
          </div>
          <div class="stat-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
            </svg>
            <div class="stat-info">
              <span class="stat-label">Wind</span>
              <span class="stat-value" id="windSpeed">— m/s</span>
            </div>
          </div>
          <div class="stat-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <div class="stat-info">
              <span class="stat-label">Visibility</span>
              <span class="stat-value" id="visibility">— km</span>
            </div>
          </div>
          <div class="stat-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/>
            </svg>
            <div class="stat-info">
              <span class="stat-label">Cloud Cover</span>
              <span class="stat-value" id="clouds">—%</span>
            </div>
          </div>
          <div class="stat-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2v8M12 22v-4M4.93 4.93l5.66 5.66M18.36 18.36l-2.83-2.83M2 12h8M22 12h-4M4.93 19.07l5.66-5.66M18.36 5.64l-2.83 2.83"/>
            </svg>
            <div class="stat-info">
              <span class="stat-label">Sunrise</span>
              <span class="stat-value" id="sunrise">—</span>
            </div>
          </div>
          <div class="stat-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="9" x2="12" y2="2"/>
              <line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/>
              <line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/>
            </svg>
            <div class="stat-info">
              <span class="stat-label">Sunset</span>
              <span class="stat-value" id="sunset">—</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Forecast -->
      <section class="forecast-section">
        <h2 class="section-title">5-Day Forecast</h2>
        <div class="forecast-grid" id="forecastGrid">
          <!-- JS populated -->
        </div>
      </section>

    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-orb"></div>
      <p class="empty-title">Where in the world?</p>
      <p class="empty-sub">Search a city to see live weather conditions and a 5-day outlook.</p>
    </div>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
